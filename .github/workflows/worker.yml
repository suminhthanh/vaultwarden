name: Worker build & e2e

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "tests/e2e/**"
      - ".github/workflows/worker.yml"
  pull_request:
    paths:
      - "worker/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - "vitest.config.ts"
      - "tests/e2e/**"
      - ".github/workflows/worker.yml"

permissions:
  contents: read

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown
          components: rustfmt, clippy

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ~/.cargo/bin/worker-build
            ~/.cargo/bin/wasm-bindgen
          key: ${{ runner.os }}-cargo-worker-${{ hashFiles('Cargo.lock', 'worker/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-worker-

      - run: npm ci

      - name: Cargo check (wasm32)
        run: cargo check -p vaultwarden-worker --target wasm32-unknown-unknown

      - name: Wrangler dry-run build
        run: npm run build

      - name: E2E parity tests
        run: npm run test:e2e
